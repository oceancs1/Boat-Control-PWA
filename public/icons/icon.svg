<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="80" fill="#0a1628"/>
  <!-- Compass rose outer ring -->
  <circle cx="256" cy="256" r="200" stroke="#1e6fc8" stroke-width="8" fill="none"/>
  <circle cx="256" cy="256" r="160" stroke="#1e3a5f" stroke-width="2" fill="none"/>
  <!-- Cardinal tick marks -->
  <line x1="256" y1="56" x2="256" y2="96" stroke="#4a9fe8" stroke-width="6" stroke-linecap="round"/>
  <line x1="456" y1="256" x2="416" y2="256" stroke="#1e6fc8" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="456" x2="256" y2="416" stroke="#1e6fc8" stroke-width="4" stroke-linecap="round"/>
  <line x1="56" y1="256" x2="96" y2="256" stroke="#1e6fc8" stroke-width="4" stroke-linecap="round"/>
  <!-- North needle (white/blue) -->
  <polygon points="256,96 242,256 256,236 270,256" fill="#4a9fe8"/>
  <!-- South needle (dark) -->
  <polygon points="256,416 242,256 256,276 270,256" fill="#1e3a5f"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="#4a9fe8"/>
  <!-- N label -->
  <text x="256" y="52" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#4a9fe8">N</text>
</svg>
